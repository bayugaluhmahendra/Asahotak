<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brain Challenge V2</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="bg"></div>

<!-- LOGIN -->

<section id="login" class="card">

<h1>🧠 Brain Challenge</h1>

<p>Masukkan nama kamu</p>

<input id="username" type="text" placeholder="Nama kamu">

<button id="playBtn">

🎮 Mulai Game

</button>

<button id="leaderBtn">

🏆 Leaderboard

</button>

</section>

<!-- QUIZ -->

<section id="quiz" class="hidden">

<header>

<div>

👤

<span id="playerName">

Player

</span>

</div>

<div>

⭐

<span id="score">

0

</span>

</div>

<div>

🔥

<span id="combo">

0

</span>

</div>

</header>

<div class="life">

❤️

❤️

❤️

</div>

<div class="progress">

<div id="progress"></div>

</div>

<div class="timerBox">

⏳

<span id="timer">

15

</span>

</div>

<h2 id="question">

Question

</h2>

<div id="answers">

<button class="answer"></button>

<button class="answer"></button>

<button class="answer"></button>

<button class="answer"></button>

</div>

<div id="number">

1 / 10

</div>

</section>

<!-- RESULT -->

<section id="result" class="card hidden">

<h1>

🏆 HASIL

</h1>

<h2 id="finalName">

Player

</h2>

<h3>

Nilai

<span id="finalScore">

0

</span>

</h3>

<h2 id="rank">

Legend

</h2>

<div id="accuracy">

Akurasi : 100%

</div>

<div id="leaderboard">

</div>

<button onclick="location.reload()">

🔄 Main Lagi

</button>

</section>

<script src="script.js"></script>

</body>

</html>
