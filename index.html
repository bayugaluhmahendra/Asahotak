<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainStorm - Game Asah Otak Ultimate</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Supabase Client CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="theme-ocean">

    <!-- AUDIO ASSETS -->
    <audio id="bgMusic" loop src="bg.mp3"></audio>
    <audio id="soundClick" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="soundCorrect" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="soundWrong" src="https://assets.mixkit.co/active_storage/sfx/2959/2959-preview.mp3"></audio>

    <!-- CONTAINER UTAMA -->
    <div class="game-container">
        
        <!-- 1. MENU UTAMA -->
        <div id="screen-menu" class="screen active">
            <div class="logo-area">
                <i class="fa-solid fa-brain pulsating"></i>
                <h1>BrainStorm</h1>
                <p>Asah Otak Tanpa Batas (Online Edition)</p>
            </div>

            <div class="player-card">
                <div class="input-group">
                    <label for="playerName"><i class="fa-solid fa-user"></i> Nama Pemain</label>
                    <input type="text" id="playerName" placeholder="Masukkan nama kamu..." autocomplete="off">
                </div>
                <div class="player-id-display">ID: <span id="playerIdDisplay">-</span></div>
            </div>

            <div class="menu-buttons">
                <button class="btn primary" onclick="startGame()"><i class="fa-solid fa-play"></i> Mulai Main</button>
                <button class="btn secondary" onclick="openScreen('screen-leaderboard')"><i class="fa-solid fa-trophy"></i> Papan Skor Online</button>
                <button class="btn secondary" onclick="openScreen('screen-stats')"><i class="fa-solid fa-chart-pie"></i> Statistik</button>
                <button class="btn secondary" onclick="openScreen('screen-achievements')"><i class="fa-solid fa-medal"></i> Achievement</button>
            </div>

            <div class="settings-bar">
                <button class="icon-btn" onclick="toggleTheme()" title="Ganti Tema"><i class="fa-solid fa-palette"></i></button>
                <button class="icon-btn" id="soundToggleBtn" onclick="toggleSound()" title="Musik/Suara"><i class="fa-solid fa-volume-high"></i></button>
            </div>
        </div>

        <!-- 2. LAYAR PERMAINAN -->
        <div id="screen-game" class="screen">
            <div class="game-header">
                <div class="stat-box"><i class="fa-solid fa-heart text-danger"></i> <span id="livesVal">7</span></div>
                <div class="stat-box timer-box"><i class="fa-solid fa-clock"></i> <span id="timerVal">25</span>s</div>
                <div class="stat-box"><i class="fa-solid fa-star text-warning"></i> <span id="scoreVal">0</span></div>
            </div>

            <div class="progress-bar-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>

            <div class="question-card">
                <div class="q-meta">Soal <span id="qCurrent">1</span>/10</div>
                <h3 id="questionText">Pertanyaan akan muncul di sini...</h3>
            </div>

            <div id="answersGrid" class="answers-grid">
                <!-- Pilihan opsi jawaban -->
            </div>
        </div>

        <!-- 3. LAYAR GAME OVER / SELESAI -->
        <div id="screen-gameover" class="screen">
            <div class="result-card">
                <h2 id="resultTitle">Permainan Selesai!</h2>
                <div class="final-score-circle">
                    <span id="finalScore">0</span>
                    <p>Skor Akhir</p>
                </div>
                <p id="resultMessage">Kerja bagus!</p>
                <p id="syncStatus" style="font-size: 0.8rem; color: #00d2ff;"></p>

                <div class="result-actions">
                    <button class="btn primary" onclick="startGame()"><i class="fa-solid fa-rotate-right"></i> Main Lagi</button>
                    <button class="btn whatsapp" onclick="shareTo('whatsapp')"><i class="fa-brands fa-whatsapp"></i> WhatsApp</button>
                    <button class="btn instagram" onclick="shareTo('instagram')"><i class="fa-brands fa-instagram"></i> Instagram</button>
                    <button class="btn secondary" onclick="openScreen('screen-menu')"><i class="fa-solid fa-home"></i> Menu Utama</button>
                </div>
            </div>
        </div>

        <!-- 4. LEADERBOARD ONLINE -->
        <div id="screen-leaderboard" class="screen">
            <h2><i class="fa-solid fa-trophy"></i> Papan Peringkat Global</h2>
            <div class="list-container" id="leaderboardList">
                <p style="text-align:center; opacity:0.6;">Memuat data online...</p>
            </div>
            <button class="btn secondary" onclick="openScreen('screen-menu')">Kembali</button>
        </div>

        <!-- 5. STATISTIK -->
        <div id="screen-stats" class="screen">
            <h2><i class="fa-solid fa-chart-pie"></i> Statistik Pemain</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3 id="statTotalPlayed">0</h3>
                    <p>Total Permainan</p>
                </div>
                <div class="stat-card">
                    <h3 id="statHighestScore">0</h3>
                    <p>Skor Tertinggi</p>
                </div>
                <div class="stat-card">
                    <h3 id="statCorrectAnswers">0</h3>
                    <p>Jawaban Benar</p>
                </div>
            </div>
            <button class="btn secondary" onclick="openScreen('screen-menu')">Kembali</button>
        </div>

        <!-- 6. ACHIEVEMENT -->
        <div id="screen-achievements" class="screen">
            <h2><i class="fa-solid fa-medal"></i> Pencapaian</h2>
            <div class="list-container" id="achievementList">
                <!-- Diisi via JS -->
            </div>
            <button class="btn secondary" onclick="openScreen('screen-menu')">Kembali</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
