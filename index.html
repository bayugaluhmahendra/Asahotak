<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Challenge</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="bgm" loop>
    <source src="bg.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>🧠 Brain Challenge</h1>

<div class="top">

<div class="box">
❤️ Nyawa
<h2 id="life">4</h2>
</div>

<div class="box">
⭐ Combo
<h2 id="combo">0</h2>
</div>

<div class="box">
⏳ Timer
<h2 id="timer">25</h2>
</div>

</div>

<div id="game">

<h2 id="question">Tekan Start</h2>

<div id="answers"></div>

<button id="startBtn">START GAME</button>

</div>

<div id="result" class="hide">

<h2>Game Selesai</h2>

<h1 id="scoreText"></h1>

<input id="playerName" placeholder="Nama">

<button id="saveBtn">Simpan Score</button>

<button id="waBtn">Share WhatsApp</button>

<button id="igBtn">Copy Caption Instagram</button>

</div>

<h2>🏆 Leaderboard</h2>

<ol id="leaderboard"></ol>

</div>

<script src="script.js"></script>

</body>
</html>
