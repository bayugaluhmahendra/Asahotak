<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asah Otak Master - Game Edukasi & Logika</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body data-theme="dark">

    <!-- AUDIO ELEMENT -->
    <audio id="bgMusic" src="bg.mp3" loop></audio>

    <div class="container">
        
        <!-- ================= HALAMAN MENU UTAMA ================= -->
        <div id="menuScreen" class="screen active">
            <div class="logo-box">
                <i class="fa-solid fa-brain pulsating-icon"></i>
                <h1>Asah Otak Master</h1>
                <p>Uji kecerdasan, kecepatan, dan logika dalam 20 soal menantang!</p>
            </div>

            <div class="card player-card">
                <div class="input-group">
                    <label for="playerName"><i class="fa-solid fa-user"></i> Nama Pemain:</label>
                    <input type="text" id="playerName" placeholder="Ketik nama kamu..." maxlength="15">
                </div>
                <div class="player-id-display" id="playerIdDisplay">ID: -</div>
            </div>

            <div class="menu-actions">
                <button class="btn btn-primary" id="startBtn"><i class="fa-solid fa-play"></i> Mulai Bermain</button>
                <button class="btn btn-secondary" id="openStatsBtn"><i class="fa-solid fa-chart-bar"></i> Statistik</button>
                <button class="btn btn-secondary" id="openAchBtn"><i class="fa-solid fa-trophy"></i> Achievement</button>
            </div>

            <div class="settings-bar">
                <button class="icon-btn" id="themeToggleBtn" title="Ganti Tema"><i class="fa-solid fa-palette"></i></button>
                <button class="icon-btn" id="musicToggleBtn" title="Musik ON/OFF"><i class="fa-solid fa-music"></i></button>
            </div>
        </div>

        <!-- ================= HALAMAN PERMAINAN ================= -->
        <div id="gameScreen" class="screen">
            <div class="game-header">
                <div class="stat-badge"><i class="fa-solid fa-heart text-danger"></i> <span id="livesDisplay">4</span>/4</div>
                <div class="stat-badge"><i class="fa-solid fa-clock text-warning"></i> <span id="timerDisplay">25</span>s</div>
                <div class="stat-badge"><i class="fa-solid fa-star text-gold"></i> <span id="scoreDisplay">0</span></div>
            </div>

            <div class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>

            <div class="card question-card">
                <div class="question-meta">
                    <span id="questionCounter">Soal 1 dari 20</span>
                    <span id="questionCategory" class="category-tag">Logika</span>
                </div>
                <h2 id="questionText">Pertanyaan akan muncul di sini?</h2>
            </div>

            <div class="options-grid" id="optionsContainer">
                <!-- Pilihan jawaban di-inject via JS -->
            </div>
        </div>

        <!-- ================= HALAMAN HASIL (GAMEOVER / SELESAI) ================= -->
        <div id="resultScreen" class="screen">
            <div class="card result-card">
                <h2 id="resultTitle">Permainan Selesai!</h2>
                <div class="result-badge-icon" id="resultIcon">🏆</div>
                
                <div class="result-stats-grid">
                    <div class="r-stat">
                        <span>Skor Akhir</span>
                        <h3 id="finalScore">0</h3>
                    </div>
                    <div class="r-stat">
                        <span>Rank Kamu</span>
                        <h3 id="finalRank">-</h3>
                    </div>
                    <div class="r-stat">
                        <span>Bonus Skor</span>
                        <h3 id="finalBonus">0</h3>
                    </div>
                    <div class="r-stat">
                        <span>Jawaban Benar</span>
                        <h3 id="finalCorrect">0/20</h3>
                    </div>
                </div>

                <div class="share-box">
                    <button class="btn btn-whatsapp" id="shareWaBtn"><i class="fa-brands fa-whatsapp"></i> Bagikan ke WhatsApp</button>
                    <button class="btn btn-instagram" id="shareIgBtn"><i class="fa-brands fa-instagram"></i> Salin untuk IG/Sosmed</button>
                </div>

                <button class="btn btn-primary" id="restartBtn"><i class="fa-solid fa-rotate-right"></i> Main Lagi</button>
                <button class="btn btn-secondary" id="homeBtn"><i class="fa-solid fa-house"></i> Menu Utama</button>
            </div>
        </div>

        <!-- ================= MODAL STATISTIK ================= -->
        <div id="statsModal" class="modal">
            <div class="modal-content">
                <span class="close-btn" id="closeStatsModal">&times;</span>
                <h2><i class="fa-solid fa-chart-bar"></i> Statistik Pemain</h2>
                <div class="stats-list" id="statsContent">
                    <!-- Data statistik di-inject via JS -->
                </div>
            </div>
        </div>

        <!-- ================= MODAL ACHIEVEMENT ================= -->
        <div id="achModal" class="modal">
            <div class="modal-content">
                <span class="close-btn" id="closeAchModal">&times;</span>
                <h2><i class="fa-solid fa-trophy"></i> Daftar Achievement</h2>
                <div class="ach-grid" id="achContent">
                    <!-- Daftar achievement di-inject via JS -->
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
