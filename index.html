
<!DOCTYPE html>

</div>

<button id="themeOcean">

<button id="musicBtn">
🎵 Music
</button>

<button id="resetBoard">

</button>

<button id="resetStats">

</button>

<button id="closeSetting">

</div>

</div>

<div>

</section>

1

</div>

0

</ol>

</section>
