<!DOCTYPE html>
<html lang="id" data-theme="cyberpunk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Reflex Challenge</title>
    <link rel="stylesheet" href="style.css">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="game-container">
        <!-- HEADER / STATS -->
        <header class="game-header">
            <div class="stat-box">❤️ <span id="lives">4</span></div>
            <div class="stat-box">⏳ <span id="timer">25</span>s</div>
            <div class="stat-box">⭐ <span id="score">0</span></div>
            <div class="stat-box">🔥 x<span id="combo">1</span></div>
        </header>

        <!-- PLAYER INFO & THEME TOGGLE -->
        <div class="top-bar">
            <span id="player-id">ID: </span>
            <div class="controls-group">
                <button id="theme-btn" title="Ganti Tema">🎨 Tema</button>
                <button id="sound-btn" title="Musik/Efek">🔊 Audio</button>
            </div>
        </div>

        <!-- MAIN GAMEPLAY AREA -->
        <main class="game-board">
            <div id="start-screen" class="screen active">
                <h1>⚡ ARCADE REFLEX ⚡</h1>
                <p>Uji kecepatan reaksimu sebelum waktu habis!</p>
                <button id="start-btn" class="btn-primary">Mulai Game</button>
                <button id="ach-btn" class="btn-secondary">🥇 Prestasi</button>
                <button id="stat-btn" class="btn-secondary">📊 Statistik</button>
            </div>

            <div id="play-screen" class="screen">
                <div id="target-box" class="target">Klik Aku!</div>
                <div id="bonus-popup" class="bonus-msg hidden">🎁 BONUS SKOR!</div>
            </div>

            <div id="gameover-screen" class="screen">
                <h2>GAME OVER</h2>
                <p>Skor Akhir: <span id="final-score">0</span></p>
                <p>Rank Kamu: <span id="final-rank">-</span></p>
                <button id="restart-btn" class="btn-primary">Main Lagi</button>
                <button id="share-btn" class="btn-secondary">📤 Bagikan Skor</button>
            </div>
        </main>
    </div>

    <!-- MODAL STATISTIK & ACHIEVEMENT -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span id="close-modal" class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
