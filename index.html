<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brain Challenge</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<!-- LOGIN -->
<div id="login" class="card">

<h1>🧠 Brain Challenge</h1>

<p>Masukkan nama kamu</p>

<input
type="text"
id="playerName"
placeholder="Nama..."
maxlength="20">

<button id="startBtn">

Mulai Game

</button>

</div>

<!-- QUIZ -->

<div id="quiz" class="hidden">

<div class="top">

<div class="player">

👤 <span id="name"></span>

</div>

<div class="score">

⭐ <span id="score">0</span>

</div>

</div>

<div class="progress">

<div id="progressBar"></div>

</div>

<div class="timer">

⏳

<span id="timer">

15

</span>

</div>

<h2 id="question">

Pertanyaan

</h2>

<div id="answers">

<button class="answer"></button>

<button class="answer"></button>

<button class="answer"></button>

<button class="answer"></button>

</div>

<div id="questionNumber">

1 / 10

</div>

</div>

<!-- RESULT -->

<div id="result" class="card hidden">

<h1>🏆 Hasil</h1>

<h2 id="finalName"></h2>

<h3>

Nilai

<span id="finalScore">

0

</span>

</h3>

<h2 id="rank">

Legend

</h2>

<button onclick="location.reload()">

Main Lagi

</button>

</div>

<script src="script.js"></script>

</body>
</html>
